name: uplive-backend

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 48mb
      --maxmemory-policy allkeys-lru
      --save ""
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.05"
    networks:
      - uplive_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uplive
      POSTGRES_PASSWORD: uplive
      POSTGRES_DB: uplive
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.05"
    networks:
      - uplive_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uplive -d uplive"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - uplive_postgres:/var/lib/postgresql/data

volumes:
  uplive_postgres:
    name: uplive_postgres

networks:
  uplive_net:
    name: uplive_net
    driver: bridge
